name: ci

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/schemas/python
          pip install -e apps/api[dev]
      - name: Test API
        env:
          PYTHONPATH: apps/api/src:packages/schemas/python/src
        run: pytest apps/api/tests -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm --filter @ralphite/web build

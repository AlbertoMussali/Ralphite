name: ci

on:
  push:
  pull_request:

jobs:
  tui-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e packages/schemas/python
          pip install -e packages/engine
          pip install -e apps/tui
          pip install pytest
      - name: Run tests
        run: pytest packages/engine/tests apps/tui/tests -q
      - name: Ralphite check
        run: ralphite check --workspace . --release-gate

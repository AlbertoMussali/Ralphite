name: ci

on:
  push:
  pull_request:

jobs:
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e packages/schemas/python
          pip install -e packages/engine
          pip install -e apps/cli
          pip install pytest
      - name: Run unit and integration suites
        run: pytest packages/engine/tests apps/cli/tests -q
      - name: Run docs quality checks
        run: |
          pytest packages/engine/tests/test_docs_knowledge_base.py -q
      - name: Enforce ADR requirement for contract-critical changes
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          ./scripts/check_adr_requirement.sh
      - name: Assert no tracked diffs after checks
        run: |
          git diff --exit-code
          git diff --cached --exit-code

  fixture-confidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e packages/schemas/python
          pip install -e packages/engine
          pip install -e apps/cli
          pip install pytest
      - name: Run fixture confidence suites
        run: |
          pytest \
            packages/engine/tests/test_fixture_plan_matrix.py \
            packages/engine/tests/test_dispatched_plan_consistency.py \
            packages/engine/tests/test_examples_plans.py \
            apps/cli/tests/test_bootstrap_e2e.py -q

  bootstrap-strict-check-smoke:
    runs-on: ubuntu-latest
    env:
      RALPHITE_DEV_SIMULATED_EXECUTION: "1"
      RALPHITE_SKIP_BACKEND_CMD_CHECKS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e packages/schemas/python
          pip install -e packages/engine
          pip install -e apps/cli
          pip install pytest
      - name: Quickstart bootstrap smoke
        run: |
          mkdir -p /tmp/ralphite-smoke
          ralphite quickstart --workspace /tmp/ralphite-smoke --bootstrap --yes --output json
      - name: Strict check smoke (repo deterministic)
        run: |
          mkdir -p /tmp/ralphite-strict-check
          ralphite check --workspace /tmp/ralphite-strict-check --strict --output json

  cross-platform-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RALPHITE_DEV_SIMULATED_EXECUTION: "1"
      RALPHITE_SKIP_BACKEND_CMD_CHECKS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e packages/schemas/python
          pip install -e packages/engine
          pip install -e apps/cli
          pip install pytest
      - name: Headless backend command-build tests
        run: |
          pytest packages/engine/tests/test_headless_agent.py apps/cli/tests/test_cli_ux_commands.py::test_check_strict_runs_backend_and_strict_checks -q
      - name: Non-interactive run smoke
        run: |
          ralphite run --workspace . --yes --output json

  perf-baseline:
    runs-on: ubuntu-latest
    env:
      RALPHITE_DEV_SIMULATED_EXECUTION: "1"
      RALPHITE_SKIP_BACKEND_CMD_CHECKS: "1"
      RALPHITE_PERF: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          pip install -e packages/schemas/python
          pip install -e packages/engine
          pip install -e apps/cli
          pip install pytest
      - name: Compare perf baseline
        run: |
          pytest apps/cli/tests/perf -q -m perf

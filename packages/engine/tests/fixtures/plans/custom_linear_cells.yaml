version: 5
plan_id: fixture_custom
name: Fixture Custom Linear Cells
materials:
  autodiscover:
    enabled: false
    path: .
    include_globs: []
  includes: []
  uploads: []
constraints:
  max_parallel: 2
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agents:
  - id: worker_default
    role: worker
    provider: codex
    model: gpt-5.3-codex
    tools_allow: [tool:*]
  - id: orchestrator_default
    role: orchestrator
    provider: codex
    model: gpt-5.3-codex
orchestration:
  template: custom
  inference_mode: mixed
  behaviors:
    - id: merge_default
      kind: merge_and_conflict_resolution
      agent: orchestrator_default
      enabled: true
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells:
      - id: pre
        kind: sequential
        task_ids: [t1]
      - id: merge
        kind: orchestrator
        behavior: merge_default
        depends_on: [pre]
      - id: post
        kind: sequential
        task_ids: [t2]
        depends_on: [merge]
tasks:
  - id: t1
    title: Pre custom step
    completed: false
    routing:
      cell: pre
      tags: [custom]
  - id: t2
    title: Post custom step
    completed: false
    routing:
      cell: post
      tags: [custom]
outputs:
  required_artifacts: []

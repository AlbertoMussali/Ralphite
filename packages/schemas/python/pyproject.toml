[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ralphite-schemas"
version = "0.1.0"
description = "Shared Ralphite schema contracts"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8,<3"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

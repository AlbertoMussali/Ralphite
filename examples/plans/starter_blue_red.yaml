version: 1
plan_id: starter_blue_red
name: Starter Blue Red
materials:
  autodiscover:
    enabled: true
    path: .
    include_globs:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.txt'
  includes: []
  uploads: []
constraints:
  max_runtime_seconds: 3600
  max_total_steps: 120
  max_cost_usd: 10.0
  fail_fast: true
  max_parallel: 3
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agents:
  - id: worker_default
    role: worker
    provider: codex
    model: gpt-5.3-codex
    reasoning_effort: medium
    tools_allow: [tool:*, mcp:*]
  - id: orchestrator_default
    role: orchestrator
    provider: codex
    model: gpt-5.3-codex
    reasoning_effort: medium
    tools_allow: [tool:*, mcp:*]
tasks:
  - id: task_feature_1
    title: Implement feature slice one.
    completed: false
    routing:
      cell: cycle
      team_mode: blue_red
      tags: [feature]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Feature slice one is implemented and reviewed.
  - id: task_feature_2
    title: Implement feature slice two.
    completed: false
    routing:
      cell: cycle
      team_mode: blue_red
      tags: [feature]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Feature slice two is implemented and reviewed.
orchestration:
  template: blue_red
  inference_mode: mixed
  behaviors:
    - id: prepare_dispatch_default
      kind: prepare_dispatch
      agent: orchestrator_default
      prompt_template: Prepare blue/red handoff context for the cycle.
      enabled: true
    - id: merge_and_conflict_resolution_default
      kind: merge_and_conflict_resolution
      agent: orchestrator_default
      prompt_template: Merge blue/red outputs and resolve conflicts safely.
      enabled: true
    - id: summarize_work_default
      kind: summarize_work
      agent: orchestrator_default
      prompt_template: Summarize cycle outcomes and residual risks.
      enabled: true
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
outputs:
  required_artifacts:
    - id: final_report
      format: markdown
    - id: machine_bundle
      format: json

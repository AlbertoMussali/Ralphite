version: 1
plan_id: starter_blue_red
name: Starter Blue Red
materials:
  autodiscover:
    enabled: true
    path: .
    include_globs:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.txt'
  includes: []
  uploads: []
constraints:
  max_runtime_seconds: 3600
  max_total_steps: 120
  max_cost_usd: 10.0
  fail_fast: true
  max_parallel: 3
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agent_defaults_ref: ../agent_defaults.yaml
tasks:
  - id: task_feature_1
    title: Implement feature slice one.
    completed: false
    routing:
      cell: cycle
      team_mode: blue_red
      tags: [feature]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Feature slice one is implemented and reviewed.
  - id: task_feature_2
    title: Implement feature slice two.
    completed: false
    routing:
      cell: cycle
      team_mode: blue_red
      tags: [feature]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Feature slice two is implemented and reviewed.
orchestration:
  template: blue_red
  inference_mode: mixed
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
outputs:
  required_artifacts:
    - id: final_report
      format: markdown
    - id: machine_bundle
      format: json

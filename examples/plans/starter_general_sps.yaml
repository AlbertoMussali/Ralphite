# Default starter template for Sequential -> Parallel -> Sequential flows.
version: 1
plan_id: starter_general_sps
name: Starter General SPS
# Materials define the initial context or files to give the agents.
# autodiscover dynamically finds files in the workspace matching the globs.
materials:
  autodiscover:
    enabled: true
    path: .
    include_globs:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.txt'
  includes: []
  uploads: []
# Constraints limit the execution sandbox, protecting against runaway costs.
# fail_fast ensures the orchestration halts immediately on the first error.
constraints:
  max_runtime_seconds: 3600
  max_total_steps: 120
  max_cost_usd: 10.0
  fail_fast: true
  max_parallel: 3
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agent_defaults_ref: ../agent_defaults.yaml
tasks:
  - id: task_plan
    title: Decompose the objective into executable steps.
    completed: false
    # Routing controls how this task is orchestrated.
    # cell determines the execution phase (e.g. seq_pre for initial sequential tasks).
    routing:
      cell: seq_pre
      tags: [planning]
    # Acceptance defines the automated exit conditions for the task.
    # The task only succeeds if the commands exit cleanly and artifacts exist.
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Task is decomposed into clear steps.
  - id: task_execute
    title: Implement the planned tasks and update project artifacts.
    completed: false
    deps: [task_plan]
    routing:
      cell: par_core
      tags: [implementation]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Feature implementation is complete.
  - id: task_verify
    title: Validate outcomes and summarize decisions.
    completed: false
    deps: [task_execute]
    routing:
      cell: seq_post
      tags: [verification]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Validation and summary are complete.
orchestration:
  template: general_sps
  inference_mode: mixed
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
outputs:
  required_artifacts:
    - id: final_report
      format: markdown
    - id: machine_bundle
      format: json

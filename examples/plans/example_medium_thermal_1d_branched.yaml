version: 1
plan_id: example_medium_thermal_1d_branched
name: Example Medium Thermal 1D Rust Python
materials:
  autodiscover:
    enabled: true
    path: .
    include_globs:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.txt'
  includes: []
  uploads: []
constraints:
  max_runtime_seconds: 5400
  max_total_steps: 200
  max_cost_usd: 20.0
  fail_fast: true
  max_parallel: 4
  acceptance_timeout_seconds: 180
  max_retries_per_node: 0
agent_defaults_ref: ../agent_defaults.yaml
tasks:
  - id: task_trunk_spec
    title: Define 1D thermal model assumptions, numerical scheme, and data I/O contract.
    completed: false
    routing:
      group: trunk
      tags: [trunk, specification]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_thermal_contract.py -k spec
      required_artifacts:
        - id: thermal_spec
          path_glob: docs/thermal/spec.md
          format: markdown
      rubric:
        - Documents constant properties, constant HTC, and boundary condition assumptions.
        - Defines Python API inputs and wide CSV output schema.
  - id: task_rust_solver_core
    title: Implement Rust core solver for steady/transient 1D conduction in layered stack.
    completed: false
    deps: [task_trunk_spec]
    routing:
      lane: lane_rust
      tags: [lane_rust, rust, solver]
    acceptance:
      commands:
        - cargo test --workspace --all-targets
      required_artifacts:
        - id: rust_solver_lib
          path_glob: rust/thermal_solver/src/lib.rs
          format: rust
      rubric:
        - Solver handles layer interfaces and boundary/HTC conditions.
        - Core API returns temperature profile and metadata needed by Python bindings.
  - id: task_rust_solver_tests
    title: Add Rust reference tests for analytic sanity checks and stability envelopes.
    completed: false
    deps: [task_rust_solver_core]
    routing:
      lane: lane_rust
      tags: [lane_rust, rust, tests]
    acceptance:
      commands:
        - cargo test --workspace --all-targets
      required_artifacts:
        - id: rust_solver_tests
          path_glob: rust/thermal_solver/tests/*.rs
          format: rust
      rubric:
        - Includes at least one known-solution case and one boundary-stress case.
  - id: task_python_bindings
    title: Expose Rust solver through Python bindings with typed dataclasses/pydantic wrappers.
    completed: false
    deps: [task_trunk_spec]
    routing:
      lane: lane_python
      tags: [lane_python, python, bindings]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_thermal_bindings.py
      required_artifacts:
        - id: python_bindings
          path_glob: src/thermal_sim/bindings.py
          format: python
      rubric:
        - Python entrypoint validates inputs and invokes Rust core consistently.
        - Binding layer maps Rust outputs into Python-native structures.
  - id: task_python_csv_export
    title: Implement simulation runner and wide-format CSV export pipeline.
    completed: false
    deps: [task_python_bindings]
    routing:
      lane: lane_python
      tags: [lane_python, python, export]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_thermal_csv_export.py
      required_artifacts:
        - id: csv_exporter
          path_glob: src/thermal_sim/export.py
          format: python
        - id: cli_runner
          path_glob: src/thermal_sim/cli.py
          format: python
      rubric:
        - Export writes deterministic wide CSV with documented column naming.
        - CLI supports input file path, output path, and boundary condition overrides.
  - id: task_trunk_integration
    title: Integrate Rust and Python lanes into one runnable simulator package.
    completed: false
    deps: [task_rust_solver_tests, task_python_csv_export]
    routing:
      group: trunk
      cell: trunk_post
      tags: [trunk, integration]
    acceptance:
      commands:
        - cargo test --workspace --all-targets
        - uv run --python 3.13 pytest -q tests/test_thermal_integration.py
      required_artifacts:
        - id: integration_module
          path_glob: src/thermal_sim/simulator.py
          format: python
      rubric:
        - End-to-end simulation run succeeds using Rust core through Python API.
        - Integration failures return actionable diagnostics.
  - id: task_trunk_verify
    title: Verify full workflow and publish usage docs with sample wide CSV output.
    completed: false
    deps: [task_trunk_integration]
    routing:
      group: trunk
      cell: trunk_post
      tags: [trunk, verification, docs]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q
      required_artifacts:
        - id: wide_csv_sample
          path_glob: outputs/*.csv
          format: csv
        - id: thermal_readme
          path_glob: README.md
          format: markdown
      rubric:
        - README documents model assumptions, CLI usage, and output schema.
        - Sample output CSV is generated and parseable.
orchestration:
  template: branched
  inference_mode: mixed
  behaviors: []
  branched:
    lanes: [lane_rust, lane_python]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
outputs:
  required_artifacts:
    - id: final_report
      format: markdown
    - id: machine_bundle
      format: json
    - id: simulation_wide_csv
      format: csv

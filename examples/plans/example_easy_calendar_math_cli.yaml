version: 1
plan_id: example_easy_calendar_math_cli
name: Example Easy Calendar Math CLI
materials:
  autodiscover:
    enabled: true
    path: .
    include_globs:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.txt'
  includes: []
  uploads: []
constraints:
  max_runtime_seconds: 3600
  max_total_steps: 120
  max_cost_usd: 10.0
  fail_fast: true
  max_parallel: 3
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agent_defaults_ref: ../agent_defaults.yaml
tasks:
  - id: task_requirements
    title: Define calendar math scope, interactive UX flow, and date edge-case rules.
    completed: false
    routing:
      cell: seq_pre
      tags: [requirements, planning]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_calendar_math_cli.py -k requirements
      required_artifacts:
        - id: requirements_doc
          path_glob: docs/calendar_math/requirements.md
          format: markdown
      rubric:
        - Documents supported operations and input/output UX.
        - Explicitly captures leap-year, month-end rollover, and negative offset rules.
  - id: task_date_math_core
    title: Implement pure Python date arithmetic utilities and validation helpers.
    completed: false
    deps: [task_requirements]
    routing:
      cell: par_core
      tags: [implementation, python]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_calendar_math_core.py
      required_artifacts:
        - id: date_math_module
          path_glob: src/calendar_math/core.py
          format: python
      rubric:
        - Date add/subtract operations are deterministic for valid Gregorian inputs.
        - Invalid inputs return actionable validation errors.
  - id: task_interactive_cli
    title: Build an interactive CLI loop for calendar math operations.
    completed: false
    deps: [task_requirements]
    routing:
      cell: par_core
      tags: [implementation, cli]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_calendar_math_cli.py -k interactive
      required_artifacts:
        - id: cli_entrypoint
          path_glob: src/calendar_math/cli.py
          format: python
      rubric:
        - CLI supports interactive prompts and clean exit paths.
        - Operation responses are human-readable and stable.
  - id: task_integration_polish
    title: Integrate CLI with core logic and harden error handling and user messaging.
    completed: false
    deps: [task_date_math_core, task_interactive_cli]
    routing:
      cell: seq_post
      tags: [integration, polish]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q tests/test_calendar_math_cli.py -k integration
      required_artifacts:
        - id: package_init
          path_glob: src/calendar_math/__init__.py
          format: python
      rubric:
        - CLI uses core module APIs without duplicated date logic.
        - Recoverable user input errors are handled without tracebacks.
  - id: task_tests_and_readme
    title: Finalize tests, usage docs, and quickstart examples.
    completed: false
    deps: [task_integration_polish]
    routing:
      cell: seq_post
      tags: [verification, docs]
    acceptance:
      commands:
        - uv run --python 3.13 pytest -q
      required_artifacts:
        - id: test_suite
          path_glob: tests/test_calendar_math_cli.py
          format: python
        - id: project_readme
          path_glob: README.md
          format: markdown
      rubric:
        - Tests cover core math behavior and interactive paths.
        - README includes setup, usage, and sample commands.
orchestration:
  template: general_sps
  inference_mode: mixed
  behaviors: []
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
outputs:
  required_artifacts:
    - id: final_report
      format: markdown
    - id: machine_bundle
      format: json

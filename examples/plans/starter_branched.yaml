version: 1
plan_id: starter_branched
name: Starter Branched
materials:
  autodiscover:
    enabled: true
    path: .
    include_globs:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.md'
      - '**/*.txt'
  includes: []
  uploads: []
constraints:
  max_runtime_seconds: 3600
  max_total_steps: 120
  max_cost_usd: 10.0
  fail_fast: true
  max_parallel: 3
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agent_defaults_ref: ../agent_defaults.yaml
tasks:
  - id: task_trunk_prelude
    title: Prepare shared context and requirements.
    completed: false
    routing:
      group: trunk
      tags: [trunk, planning]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Prelude context is clear.
  - id: task_lane_a
    title: Implement lane A work.
    completed: false
    deps: [task_trunk_prelude]
    routing:
      lane: lane_a
      tags: [lane]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Lane A work is complete.
  - id: task_lane_b
    title: Implement lane B work.
    completed: false
    deps: [task_trunk_prelude]
    routing:
      lane: lane_b
      tags: [lane]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Lane B work is complete.
  - id: task_trunk_finalize
    title: Merge lane outputs and verify.
    completed: false
    deps: [task_lane_a, task_lane_b]
    routing:
      group: trunk
      cell: trunk_post
      tags: [trunk, finalize]
    acceptance:
      commands: []
      required_artifacts: []
      rubric:
        - Joined output is coherent.
orchestration:
  template: branched
  inference_mode: mixed
  behaviors: []
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
outputs:
  required_artifacts:
    - id: final_report
      format: markdown
    - id: machine_bundle
      format: json

version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ralphite
      POSTGRES_PASSWORD: ralphite
      POSTGRES_DB: ralphite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      RALPHITE_DATABASE_URL: postgresql+psycopg://ralphite:ralphite@db:5432/ralphite
      RALPHITE_CORS_ORIGINS: http://localhost:5173
      RALPHITE_SECRET_KEY: change-me
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:

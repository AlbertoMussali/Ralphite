version: 1
plan_id: fixture_branched
name: Fixture Branched Two Lane
materials:
  autodiscover:
    enabled: false
    path: .
    include_globs: []
  includes: []
  uploads: []
constraints:
  max_parallel: 3
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agents:
  - id: worker_default
    role: worker
    provider: codex
    model: gpt-5.3-codex
    tools_allow: [tool:*]
  - id: orchestrator_default
    role: orchestrator
    provider: codex
    model: gpt-5.3-codex
orchestration:
  template: branched
  inference_mode: mixed
  behaviors:
    - id: prepare_default
      kind: prepare_dispatch
      agent: orchestrator_default
      enabled: true
    - id: merge_default
      kind: merge_and_conflict_resolution
      agent: orchestrator_default
      enabled: true
    - id: summarize_default
      kind: summarize_work
      agent: orchestrator_default
      enabled: true
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
tasks:
  - id: t1
    title: Trunk prelude
    completed: false
    routing:
      group: trunk
      tags: [trunk]
  - id: t2
    title: Lane A implementation
    completed: false
    deps: [t1]
    routing:
      lane: lane_a
      tags: [lane-a]
  - id: t3
    title: Lane B implementation
    completed: false
    deps: [t1]
    routing:
      lane: lane_b
      tags: [lane-b]
  - id: t4
    title: Trunk finalization
    completed: false
    deps: [t2, t3]
    routing:
      group: trunk
      cell: trunk_post
      tags: [trunk]
outputs:
  required_artifacts: []

version: 1
plan_id: fixture_general_sps
name: Fixture General SPS Minimal
materials:
  autodiscover:
    enabled: false
    path: .
    include_globs: []
  includes: []
  uploads: []
constraints:
  max_parallel: 2
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agents:
  - id: worker_default
    role: worker
    provider: codex
    model: gpt-5.3-codex
    tools_allow: [tool:*]
  - id: orchestrator_default
    role: orchestrator
    provider: codex
    model: gpt-5.3-codex
orchestration:
  template: general_sps
  inference_mode: mixed
  behaviors:
    - id: prepare_default
      kind: prepare_dispatch
      agent: orchestrator_default
      enabled: true
    - id: merge_default
      kind: merge_and_conflict_resolution
      agent: orchestrator_default
      enabled: true
    - id: summarize_default
      kind: summarize_work
      agent: orchestrator_default
      enabled: true
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
tasks:
  - id: t1
    title: Prepare
    completed: false
    routing:
      cell: seq_pre
      tags: [prep]
  - id: t2
    title: Build parallel shard
    completed: false
    deps: [t1]
    routing:
      cell: par_core
      tags: [build]
  - id: t3
    title: Verify
    completed: false
    deps: [t2]
    routing:
      cell: seq_post
      tags: [verify]
outputs:
  required_artifacts: []

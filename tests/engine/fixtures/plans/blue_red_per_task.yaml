version: 1
plan_id: fixture_blue_red
name: Fixture Blue Red Per Task
materials:
  autodiscover:
    enabled: false
    path: .
    include_globs: []
  includes: []
  uploads: []
constraints:
  max_parallel: 2
  acceptance_timeout_seconds: 120
  max_retries_per_node: 0
agents:
  - id: worker_default
    role: worker
    provider: codex
    model: gpt-5.3-codex
    tools_allow: [tool:*]
  - id: orchestrator_default
    role: orchestrator
    provider: codex
    model: gpt-5.3-codex
orchestration:
  template: blue_red
  inference_mode: mixed
  behaviors:
    - id: prepare_default
      kind: prepare_dispatch
      agent: orchestrator_default
      enabled: true
    - id: merge_default
      kind: merge_and_conflict_resolution
      agent: orchestrator_default
      enabled: true
    - id: summarize_default
      kind: summarize_work
      agent: orchestrator_default
      enabled: true
  branched:
    lanes: [lane_a, lane_b]
  blue_red:
    loop_unit: per_task
  custom:
    cells: []
tasks:
  - id: t1
    title: Implement feature slice one
    completed: false
    routing:
      cell: cycle
      team_mode: blue_red
      tags: [feature]
  - id: t2
    title: Implement feature slice two
    completed: false
    routing:
      cell: cycle
      team_mode: blue_red
      tags: [feature]
outputs:
  required_artifacts: []

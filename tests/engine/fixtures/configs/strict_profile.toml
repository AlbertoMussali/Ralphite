# Strict policy fixture for config loading/validation scenarios.
[profile]
name = "strict"

[policy]
allow_tools = ["tool:git", "tool:rg"]
deny_tools = ["tool:rm"]
allow_mcps = ["mcp:*"]
deny_mcps = []

[ui]
compact_timeline = true

[run]
default_plan = ""
task_writeback_mode = "revision_only"

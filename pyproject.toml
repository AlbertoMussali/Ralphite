[tool.uv.workspace]
members = [
  "apps/cli",
  "packages/engine",
  "packages/schemas/python"
]

[tool.uv.sources]
ralphite-cli = { workspace = true }
ralphite-engine = { workspace = true }
ralphite-schemas = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.4",
]

[tool.pytest.ini_options]
markers = [
  "perf: performance baseline checks (opt-in with RALPHITE_PERF=1)"
]

[tool.ruff]
extend-exclude = ["build"]
